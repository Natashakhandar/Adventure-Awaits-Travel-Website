version: '3'

services:
  backend:
    build: ./backend
    container_name: backend
    ports:
      - "5000:5000"
    restart: always

  frontend:
  image: node:18
  container_name: frontend
  working_dir: /app/frontend   # 🔥 IMPORTANT
  volumes:
    - .:/app
  command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
  ports:
    - "5173:5173"
  depends_on:
    - backend
